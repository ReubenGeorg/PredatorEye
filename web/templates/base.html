<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}PredatorEye{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#cdd6f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
a{color:#00d4ff;text-decoration:none}
a:hover{text-decoration:underline}

/* Nav */
nav{background:#0d1421;border-bottom:1px solid #1e2d45;padding:.9rem 2rem;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
.nav-brand{display:flex;align-items:center;gap:.6rem;text-decoration:none}
.eye{width:36px;height:22px}
.brand-name{font-size:1.2rem;font-weight:900;color:#cdd6f4}
.brand-name span{color:#e63946}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-links a{color:#6e7fa3;font-size:.9rem;font-weight:500}
.nav-links a:hover{color:#cdd6f4;text-decoration:none}
.btn{display:inline-block;padding:.5rem 1.2rem;border-radius:8px;font-weight:700;font-size:.9rem;transition:.15s;cursor:pointer;border:none;text-align:center}
.btn-primary{background:#e63946;color:#fff}
.btn-primary:hover{background:#c0313d;text-decoration:none;color:#fff}
.btn-outline{background:transparent;color:#e63946;border:1.5px solid #e63946}
.btn-outline:hover{background:#e6394615;text-decoration:none}
.btn-lg{padding:.75rem 2rem;font-size:1rem;border-radius:10px}

/* Layout */
.container{max-width:1100px;margin:0 auto;padding:2rem 1rem}
.card{background:#0d1421;border:1px solid #1e2d45;border-radius:12px;padding:1.5rem}

/* Badges */
.badge{padding:.2rem .65rem;border-radius:5px;font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.bc{background:#e6394615;color:#e63946;border:1px solid #e6394650}
.bh{background:#ff8c4215;color:#ff8c42;border:1px solid #ff8c4250}
.bm{background:#ffd16615;color:#ffd166;border:1px solid #ffd16650}
.bl{background:#00e67615;color:#00e676;border:1px solid #00e67650}

footer{border-top:1px solid #1e2d45;padding:1.5rem;text-align:center;color:#6e7fa3;font-size:.85rem;margin-top:4rem}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d1421}
::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:3px}
</style>
{% block extra_style %}{% endblock %}
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="/">
      <svg class="eye" viewBox="0 0 64 40">
        <path d="M2 20 C12 2 52 2 62 20 C52 38 12 38 2 20Z" fill="none" stroke="#e63946" stroke-width="3"/>
        <circle cx="32" cy="20" r="9" fill="#e63946"/>
        <circle cx="32" cy="20" r="4" fill="#080c14"/>
        <circle cx="35" cy="17" r="2" fill="#ff6b7a" opacity=".7"/>
      </svg>
      <span class="brand-name">Predator<span>Eye</span></span>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/#how">How It Works</a>
      <a href="/#features">Features</a>
      <a href="/scan" class="btn btn-primary">Scan My Device</a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  PredatorEye v1.0.0 &bull; Defensive Security Tool &bull;
  For authorised use only &bull;
  Reports are automatically deleted after 24 hours
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
